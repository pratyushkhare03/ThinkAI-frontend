<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>AI Quiz Generator - NotesBuddy</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #333;
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        header {
            text-align: center;
            padding: 30px 20px;
            background: linear-gradient(135deg, #4285F4, #34A853, #9B72CB);
            color: white;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 8px 30px rgba(66, 133, 244, 0.3);
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 10px;
        }

        .logo-icon {
            font-size: 2rem;
            background: white;
            color: #4285F4;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .subtitle {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        /* Quiz Setup Section */
        .quiz-setup {
            background: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
        }

        .quiz-setup h2 {
            color: #4285F4;
            margin-bottom: 20px;
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .setup-form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #4285F4;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s;
            font-size: 1rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4285F4, #3367D6);
            color: white;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #3367D6, #2851A3);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(66, 133, 244, 0.3);
        }

        .btn-success {
            background: linear-gradient(135deg, #34A853, #2E8B47);
            color: white;
        }

        .btn-success:hover {
            background: linear-gradient(135deg, #2E8B47, #247037);
        }

        .btn-secondary {
            background: #9E9E9E;
            color: white;
        }

        .btn-secondary:hover {
            background: #757575;
        }

        /* Quiz Container */
        .quiz-container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
            display: none;
        }

        .quiz-container.active {
            display: block;
        }

        /* Quiz Header */
        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }

        .quiz-progress {
            flex: 1;
        }

        .progress-text {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 8px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4285F4, #34A853);
            transition: width 0.3s ease;
            border-radius: 10px;
        }

        .quiz-stats {
            display: flex;
            gap: 20px;
            margin-left: 30px;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #4285F4;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #666;
        }

        /* Question Card */
        .question-card {
            margin-bottom: 30px;
        }

        .question-number {
            display: inline-block;
            background: linear-gradient(135deg, #4285F4, #9B72CB);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .question-text {
            font-size: 1.3rem;
            color: #333;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        /* Options */
        .options {
            display: grid;
            gap: 15px;
        }

        .option {
            padding: 18px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 15px;
            background: white;
        }

        .option:hover {
            border-color: #4285F4;
            background: #f8f9fa;
            transform: translateX(5px);
        }

        .option-letter {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #666;
            flex-shrink: 0;
        }

        .option-text {
            flex: 1;
            font-size: 1rem;
        }

        .option.selected {
            border-color: #4285F4;
            background: linear-gradient(135deg, rgba(66, 133, 244, 0.1), rgba(155, 114, 203, 0.1));
        }

        .option.selected .option-letter {
            background: #4285F4;
            color: white;
        }

        .option.correct {
            border-color: #34A853;
            background: linear-gradient(135deg, rgba(52, 168, 83, 0.1), rgba(46, 139, 71, 0.1));
        }

        .option.correct .option-letter {
            background: #34A853;
            color: white;
        }

        .option.wrong {
            border-color: #EA4335;
            background: linear-gradient(135deg, rgba(234, 67, 53, 0.1), rgba(211, 52, 38, 0.1));
        }

        .option.wrong .option-letter {
            background: #EA4335;
            color: white;
        }

        .option.disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        /* Explanation */
        .explanation {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-left: 4px solid #4285F4;
            border-radius: 8px;
            display: none;
        }

        .explanation.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .explanation-title {
            font-weight: bold;
            color: #4285F4;
            margin-bottom: 8px;
        }

        /* Navigation Buttons */
        .quiz-navigation {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
        }

        /* Results Section */
        .results-container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
            text-align: center;
            display: none;
        }

        .results-container.active {
            display: block;
        }

        .results-icon {
            font-size: 5rem;
            margin-bottom: 20px;
        }

        .results-title {
            font-size: 2rem;
            color: #4285F4;
            margin-bottom: 10px;
        }

        .results-score {
            font-size: 4rem;
            font-weight: bold;
            color: #34A853;
            margin: 20px 0;
        }

        .results-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .result-stat {
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
        }

        .result-stat-value {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .result-stat-value.correct {
            color: #34A853;
        }

        .result-stat-value.wrong {
            color: #EA4335;
        }

        .result-stat-value.percentage {
            color: #4285F4;
        }

        .result-stat-label {
            color: #666;
            font-size: 0.9rem;
        }

        .results-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }

        /* Loading Overlay */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .loading-overlay.active {
            display: flex;
        }

        .loading-content {
            background: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            max-width: 400px;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid #f3f3f3;
            border-top: 6px solid #4285F4;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .setup-form {
                grid-template-columns: 1fr;
            }

            .quiz-header {
                flex-direction: column;
                gap: 20px;
            }

            .quiz-stats {
                margin-left: 0;
            }

            h1 {
                font-size: 2rem;
            }

            .results-score {
                font-size: 3rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Header -->
        <header>
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-question-circle"></i>
                </div>
                <h1>AI Quiz Generator</h1>
            </div>
            <p class="subtitle">Test your knowledge with AI-generated quizzes on any topic</p>
        </header>

        <!-- Quiz Setup -->
        <div class="quiz-setup" id="quizSetup">
            <h2><i class="fas fa-cog"></i> Create Your Quiz</h2>
            <div class="setup-form">
                <div class="form-group">
                    <label for="topic">Quiz Topic</label>
                    <input type="text" id="topic" placeholder="e.g., Photosynthesis, World War II">
                </div>
                <div class="form-group">
                    <label for="difficulty">Difficulty Level</label>
                    <select id="difficulty">
                        <option value="easy">Easy</option>
                        <option value="medium" selected>Medium</option>
                        <option value="hard">Hard</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="numQuestions">Number of Questions</label>
                    <select id="numQuestions">
                        <option value="5">5 Questions</option>
                        <option value="10" selected>10 Questions</option>
                        <option value="15">15 Questions</option>
                        <option value="20">20 Questions</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category">
                        <option value="science">Science</option>
                        <option value="history">History</option>
                        <option value="math">Mathematics</option>
                        <option value="literature">Literature</option>
                        <option value="general">General Knowledge</option>
                    </select>
                </div>
                <div class="form-group full-width">
                    <label for="notes">Paste Your Notes (Optional)</label>
                    <textarea id="notes" placeholder="Paste your lecture notes here to generate quiz questions from them..."></textarea>
                </div>
            </div>
            <button class="btn btn-primary" onclick="generateQuiz()">
                <i class="fas fa-magic"></i> Generate Quiz
            </button>
        </div>

        <!-- Quiz Container -->
        <div class="quiz-container" id="quizContainer">
            <div class="quiz-header">
                <div class="quiz-progress">
                    <div class="progress-text">Question <span id="currentQ">1</span> of <span id="totalQ">10</span></div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                </div>
                <div class="quiz-stats">
                    <div class="stat">
                        <div class="stat-value" id="correctCount">0</div>
                        <div class="stat-label">Correct</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="wrongCount">0</div>
                        <div class="stat-label">Wrong</div>
                    </div>
                </div>
            </div>

            <div class="question-card" id="questionCard">
                <!-- Question will be inserted here -->
            </div>

            <div class="quiz-navigation">
                <button class="btn btn-secondary" onclick="previousQuestion()" id="prevBtn" disabled>
                    <i class="fas fa-arrow-left"></i> Previous
                </button>
                <button class="btn btn-primary" onclick="nextQuestion()" id="nextBtn" disabled>
                    Next <i class="fas fa-arrow-right"></i>
                </button>
            </div>
        </div>

        <!-- Results Container -->
        <div class="results-container" id="resultsContainer">
            <div class="results-icon" id="resultsIcon">🎉</div>
            <h2 class="results-title">Quiz Completed!</h2>
            <div class="results-score" id="finalScore">0%</div>

            <div class="results-stats">
                <div class="result-stat">
                    <div class="result-stat-value correct" id="finalCorrect">0</div>
                    <div class="result-stat-label">Correct Answers</div>
                </div>
                <div class="result-stat">
                    <div class="result-stat-value wrong" id="finalWrong">0</div>
                    <div class="result-stat-label">Wrong Answers</div>
                </div>
                <div class="result-stat">
                    <div class="result-stat-value percentage" id="finalPercentage">0%</div>
                    <div class="result-stat-label">Accuracy</div>
                </div>
            </div>

            <div class="results-actions">
                <button class="btn btn-primary" onclick="retryQuiz()">
                    <i class="fas fa-redo"></i> Retry Quiz
                </button>
                <button class="btn btn-success" onclick="newQuiz()">
                    <i class="fas fa-plus"></i> New Quiz
                </button>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-content">
            <div class="spinner"></div>
            <div style="font-size: 1.2rem; margin-bottom: 10px;">Generating Quiz...</div>
            <div style="color: #666; font-size: 0.9rem;">AI is creating questions for you</div>
        </div>
    </div>

    <script>
        let quizData = [];
        let currentQuestion = 0;
        let correctAnswers = 0;
        let wrongAnswers = 0;
        let userAnswers = [];

        // Sample quiz data
        const sampleQuizzes = {
            science: [
                {
                    question: "What is the powerhouse of the cell?",
                    options: ["Nucleus", "Mitochondria", "Ribosome", "Chloroplast"],
                    correct: 1,
                    explanation: "Mitochondria are known as the powerhouse of the cell because they generate most of the cell's supply of ATP, which is used as a source of chemical energy."
                },
                {
                    question: "What is the chemical symbol for water?",
                    options: ["H2O", "CO2", "O2", "NaCl"],
                    correct: 0,
                    explanation: "H2O represents water, where H stands for hydrogen and O stands for oxygen. Two hydrogen atoms bond with one oxygen atom to form water."
                },
                {
                    question: "What process do plants use to convert sunlight into energy?",
                    options: ["Respiration", "Photosynthesis", "Digestion", "Fermentation"],
                    correct: 1,
                    explanation: "Photosynthesis is the process by which plants use sunlight, water, and carbon dioxide to create oxygen and energy in the form of sugar."
                },
                {
                    question: "What is the speed of light in vacuum?",
                    options: ["300,000 km/s", "150,000 km/s", "450,000 km/s", "600,000 km/s"],
                    correct: 0,
                    explanation: "The speed of light in vacuum is approximately 299,792 kilometers per second, commonly rounded to 300,000 km/s."
                },
                {
                    question: "Which planet is known as the Red Planet?",
                    options: ["Venus", "Jupiter", "Mars", "Saturn"],
                    correct: 2,
                    explanation: "Mars is called the Red Planet because of its reddish appearance, which is due to iron oxide (rust) on its surface."
                }
            ],
            history: [
                {
                    question: "In which year did World War II end?",
                    options: ["1943", "1944", "1945", "1946"],
                    correct: 2,
                    explanation: "World War II ended in 1945, with Germany surrendering in May and Japan surrendering in September after the atomic bombings."
                },
                {
                    question: "Who was the first President of the United States?",
                    options: ["Thomas Jefferson", "George Washington", "Abraham Lincoln", "John Adams"],
                    correct: 1,
                    explanation: "George Washington served as the first President of the United States from 1789 to 1797."
                },
                {
                    question: "What year did the Berlin Wall fall?",
                    options: ["1987", "1988", "1989", "1990"],
                    correct: 2,
                    explanation: "The Berlin Wall fell on November 9, 1989, marking a significant moment in the end of the Cold War."
                }
            ]
        };

        // Generate quiz
        async function generateQuiz() {
            const topic = document.getElementById('topic').value.trim();
            const difficulty = document.getElementById('difficulty').value;
            const numQuestions = parseInt(document.getElementById('numQuestions').value);
            const category = document.getElementById('category').value;
            const notes = document.getElementById('notes').value.trim();

            if (!topic && !notes) {
                alert('Please enter a topic or paste your notes!');
                return;
            }

            document.getElementById('loadingOverlay').classList.add('active');

            try {
                // Try to fetch from backend
                const response = await fetch('https://thinkai-backend-bxjg.onrender.com/api/generate-quiz/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        topic: topic,
                        difficulty: difficulty,
                        num_questions: numQuestions,
                        category: category,
                        notes: notes
                    })
                });

                const data = await response.json();
                quizData = data.questions;
            } catch (error) {
                console.error('Error generating quiz:', error);
                
                // Fallback to sample data
                const sampleCategory = sampleQuizzes[category] || sampleQuizzes.science;
                quizData = sampleCategory.slice(0, numQuestions);
            }

            setTimeout(() => {
                document.getElementById('loadingOverlay').classList.remove('active');
                startQuiz();
            }, 1500);
        }

        // Start quiz
        function startQuiz() {
            currentQuestion = 0;
            correctAnswers = 0;
            wrongAnswers = 0;
            userAnswers = new Array(quizData.length).fill(null);

            document.getElementById('quizSetup').style.display = 'none';
            document.getElementById('quizContainer').classList.add('active');
            document.getElementById('resultsContainer').classList.remove('active');

            document.getElementById('totalQ').textContent = quizData.length;
            updateQuestion();
        }

        // Update question display
        function updateQuestion() {
            const question = quizData[currentQuestion];
            const questionCard = document.getElementById('questionCard');

            questionCard.innerHTML = `
                <div class="question-number">Question ${currentQuestion + 1}</div>
                <div class="question-text">${question.question}</div>
                <div class="options" id="options">
                    ${question.options.map((option, index) => `
                        <div class="option" onclick="selectOption(${index})">
                            <div class="option-letter">${String.fromCharCode(65 + index)}</div>
                            <div class="option-text">${option}</div>
                        </div>
                    `).join('')}
                </div>
                <div class="explanation" id="explanation">
                    <div class="explanation-title">💡 Explanation:</div>
                    <div>${question.explanation}</div>
                </div>
            `;

            // Update progress
            document.getElementById('currentQ').textContent = currentQuestion + 1;
            document.getElementById('progressFill').style.width = 
                `${((currentQuestion + 1) / quizData.length) * 100}%`;

            // Restore previous answer if exists
            if (userAnswers[currentQuestion] !== null) {
                const options = document.querySelectorAll('.option');
                options[userAnswers[currentQuestion]].classList.add('selected');
                showResult(userAnswers[currentQuestion]);
            }

            // Update navigation buttons
            document.getElementById('prevBtn').disabled = currentQuestion === 0;
            document.getElementById('nextBtn').disabled = false;
            
            if (currentQuestion === quizData.length - 1) {
                document.getElementById('nextBtn').innerHTML = 
                    'Finish <i class="fas fa-check"></i>';
            } else {
                document.getElementById('nextBtn').innerHTML = 
                    'Next <i class="fas fa-arrow-right"></i>';
            }
        }

        // Select option
        function selectOption(index) {
            if (userAnswers[currentQuestion] !== null) return; // Already answered

            const question = quizData[currentQuestion];
            const options = document.querySelectorAll('.option');

            // Mark selected option
            options[index].classList.add('selected');
            userAnswers[currentQuestion] = index;

            // Disable all options
            options.forEach(opt => opt.classList.add('disabled'));

            // Show result
            showResult(index);

            // Enable next button
            document.getElementById('nextBtn').disabled = false;
        }

        // Show result
        function showResult(selectedIndex) {
            const question = quizData[currentQuestion];
            const options = document.querySelectorAll('.option');

            if (selectedIndex === question.correct) {
                options[selectedIndex].classList.add('correct');
                if (userAnswers[currentQuestion] === selectedIndex) {
                    correctAnswers++;
                    document.getElementById('correctCount').textContent = correctAnswers;
                }
            } else {
                options[selectedIndex].classList.add('wrong');
                options[question.correct].classList.add('correct');
                if (userAnswers[currentQuestion] === selectedIndex) {
                    wrongAnswers++;
                    document.getElementById('wrongCount').textContent = wrongAnswers;
                }
            }

            // Show explanation
            document.getElementById('explanation').classList.add('show');
        }

        // Next question
        function nextQuestion() {
            if (userAnswers[currentQuestion] === null) {
                alert('Please select an answer before proceeding!');
                return;
            }

            if (currentQuestion < quizData.length - 1) {
                currentQuestion++;
                updateQuestion();
            } else {
                showResults();
            }
        }

        // Previous question
        function previousQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                updateQuestion();
            }
        }

        // Show results
        function showResults() {
            const percentage = Math.round((correctAnswers / quizData.length) * 100);

            document.getElementById('quizContainer').classList.remove('active');
            document.getElementById('resultsContainer').classList.add('active');

            // Set results
            document.getElementById('finalScore').textContent = percentage + '%';
            document.getElementById('finalCorrect').textContent = correctAnswers;
            document.getElementById('finalWrong').textContent = wrongAnswers;
            document.getElementById('finalPercentage').textContent = percentage + '%';

            // Set icon based on performance
            const icon = document.getElementById('resultsIcon');
            if (percentage >= 80) {
                icon.textContent = '🎉';
            } else if (percentage >= 60) {
                icon.textContent = '👍';
            } else {
                icon.textContent = '📚';
            }
        }

        // Retry quiz
        function retryQuiz() {
            startQuiz();
        }

        // New quiz
        function newQuiz() {
            document.getElementById('quizSetup').style.display = 'block';
            document.getElementById('quizContainer').classList.remove('active');
            document.getElementById('resultsContainer').classList.remove('active');
            document.getElementById('topic').value = '';
            document.getElementById('notes').value = '';
        }
    </script>
</body>

</html>
